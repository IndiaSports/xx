<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Z Fast Follow - Auto Pilot</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-start { background-color: #e1306c; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .btn-start:hover { background-color: #c11f53; }
        #status { font-weight: bold; color: #333; margin-top: 15px; font-size: 15px; }
        .progress-bar { width: 100%; background-color: #e0e0e0; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress { height: 10px; width: 0%; background-color: #0095f6; transition: width 0.3s; }
    </style>
</head>
<body>

    <h2>Instagram Fast Follow (Auto-Pilot Mode)</h2>
    <p>Har 2 second me ek naye tab me profile khulegi. Pop-up blocker ko 'Allow' karna na bhulein.</p>

    <div class="container">
        <button class="btn-start" onclick="startAutoRedirect()">🚀 Start Auto Automation</button>
        <div class="progress-bar">
            <div class="progress" id="myBar"></div>
        </div>
        <div id="status">Status: Waiting to start...</div>
    </div>

    <script>
        // 45 Trendy Gen Z Muslim Girls & Brand Username Variations
        const usernames = [
            "btw_aliza", "btw_aliza1", "btw_aliza_", "aliza_btw",
            "btw_mehek", "btw_mehek1", "btw_mehek_", "mehek_btw",
            "btw_sana", "btw_sana1", "btw_sana_", "btw_rida",
            "btw_rida1", "btw_rida_", "rida_btw", "btw_fiza",
            "btw_fiza1", "btw_fiza_", "btw_ifra", "btw_ifra1",
            "btw_ifra_", "btw_iqra", "btw_iqra1", "btw_iqra_",
            "btw_ayat", "btw_ayat1", "btw_ayat_", "btw_muskan",
            "btw_muskan1", "btw_muskan_", "btw_maheen", "btw_maheen1",
            "btw_maheen_", "btw_haniya", "btw_haniya1", "btw_haniya_",
            "btw_laiba", "btw_laiba1", "btw_laiba_", "btw_shifa",
            "btw_shifa1", "btw_shifa_", "btw_falak", "btw_falak1",
            "btw_falak_"
        ];

        let index = 0;
        let intervalId = null;

        function startAutoRedirect() {
            if (intervalId !== null) return; // Prevent multiple clicks
            
            document.getElementById("status").innerText = "Running... Processing IDs.";
            
            intervalId = setInterval(() => {
                if (index < usernames.length) {
                    let url = "https://www.instagram.com/" + usernames[index];
                    window.open(url, '_blank'); // Opens in new tab
                    
                    index++;
                    
                    // Update Status & Progress Bar
                    document.getElementById("status").innerText = `Opening: ${index} / ${usernames.length} (@${usernames[index-1]})`;
                    let percentage = (index / usernames.length) * 100;
                    document.getElementById("myBar").style.width = percentage + "%";
                } else {
                    clearInterval(intervalId);
                    document.getElementById("status").innerText = "🎉 All IDs opened successfully!";
                    intervalId = null;
                    index = 0; // Reset for next time
                }
            }, 2000); // 2000 milliseconds = 2 Seconds
        }
    </script>

</body>
</html>
